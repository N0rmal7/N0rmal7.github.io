<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="400" viewBox="0 0 1920 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="50%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="1920" height="400" fill="url(#bg)"/>
  <!-- 装饰线 -->
  <line x1="560" y1="245" x2="790" y2="245" stroke="#888" stroke-width="1" opacity="0.4"/>
  <line x1="1130" y1="245" x2="1360" y2="245" stroke="#888" stroke-width="1" opacity="0.4"/>
  <!-- KSKBL 居中文字 -->
  <text x="960" y="218" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="100" font-weight="bold" fill="#e0e0e0" filter="url(#shadow)" letter-spacing="34">KSKBL</text>
</svg>
